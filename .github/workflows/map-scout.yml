name: Daily map scout (Grok agent)

on:
  schedule:
    - cron: "0 11 * * *"   # daily 11:00 UTC (~7am ET)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: map-scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run map scout
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || 'grok-4' }}
        run: python scripts/map_scout.py

      # The org blocks Actions from opening PRs, so commit map updates directly
      # (contents:write is allowed). compute-stats.yml then recomputes the
      # homepage numbers from the new map on push.
      - name: Commit map updates if changed
        env:
          GIT_NAME: map-scout
          GIT_EMAIL: map-scout@users.noreply.github.com
        run: |
          bash scripts/safe_commit.sh "Map scout: update map-data.json $(date -u +'%Y-%m-%d %H:%M UTC')" map-data.json
