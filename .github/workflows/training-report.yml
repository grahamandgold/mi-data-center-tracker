name: Training report (is the newsroom learning?)

on:
  schedule:
    - cron: "0 10 * * 1"   # Mondays, 6 AM ET
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute training metrics
        run: python scripts/training_report.py

      - name: Commit if changed
        env:
          GIT_NAME: training-report
          GIT_EMAIL: training-report@users.noreply.github.com
        run: |
          bash scripts/safe_commit.sh "Training report $(date -u +'%Y-%m-%d')" training-report.json
