name: Daily podcast (Michigan Data Wire)

on:
  schedule:
    - cron: "0 11 * * *"   # 7:00 AM ET — "Mornings with Graham & Emmy"
    - cron: "0 22 * * *"   # 6:00 PM ET — "Evenings with Graham & Emmy"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-podcast
  cancel-in-progress: false

jobs:
  episode:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg

      - name: Build today's episode
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || 'grok-4' }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/podcast_agent.py

      - name: Commit episode
        env:
          GIT_NAME: data-wire-podcast
          GIT_EMAIL: podcast@users.noreply.github.com
        run: |
          bash scripts/safe_commit.sh "Daily episode $(date -u +'%Y-%m-%d')" pod/
