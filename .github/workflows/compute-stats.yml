name: Stats from map (map is truth)

on:
  push:
    branches: [main]
    paths: ["map-data.json"]
  schedule:
    - cron: "20 8 * * *"   # daily safety net, after map hygiene
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: compute-stats
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Recompute homepage stats from map-data.json
        run: python scripts/compute_stats.py
      - name: Commit if changed
        env:
          GIT_NAME: compute-stats
          GIT_EMAIL: compute-stats@users.noreply.github.com
        run: |
          bash scripts/safe_commit.sh "Stats: recompute from map-data.json $(date -u +'%Y-%m-%d')" content-data.js
