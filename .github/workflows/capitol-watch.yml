name: Capitol watch (Michigan Legislature)

on:
  schedule:
    - cron: "45 4,10,16,22 * * *"   # four times daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: capitol-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check legislative actions
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: python scripts/capitol_watch.py

      - name: Commit if changed
        env:
          GIT_NAME: capitol-watch
          GIT_EMAIL: capitol-watch@users.noreply.github.com
        run: |
          bash scripts/safe_commit.sh "Capitol watch $(date -u +'%Y-%m-%d %H:%M UTC')" live-data.json live-data-pending.json capitol-state.json
