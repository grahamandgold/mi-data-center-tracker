name: Story pages (SEO snapshots)

on:
  push:
    branches: [main]
    paths: ["live-data.json"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: story-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render static story pages + sitemap
        run: python scripts/build_story_pages.py

      - name: Commit if changed
        env:
          GIT_NAME: story-pages
          GIT_EMAIL: story-pages@users.noreply.github.com
        run: |
          bash scripts/safe_commit.sh "SEO: refresh static story pages" stories/pages sitemap-stories.xml
