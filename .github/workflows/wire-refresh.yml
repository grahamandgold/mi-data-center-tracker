name: Hourly wire refresh (Grok agent)

on:
  schedule:
    - cron: "15 * * * *"   # every hour at :15 UTC
  workflow_dispatch: {}     # manual run button

permissions:
  contents: write

concurrency:
  group: wire-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ingest fresh Google News stories (grounds the wire in real coverage)
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || '' }}
        run: python scripts/news_ingest.py

      - name: Run Grok wire agent
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || '' }}
        run: python scripts/wire_agent.py

      - name: Verify headline accuracy against sources
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || '' }}
        run: python scripts/headline_check.py

      - name: Second-model newsworthiness judge (Claude grades Grok's picks)
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JUDGE_THRESHOLD: ${{ vars.JUDGE_THRESHOLD || '6' }}
        run: python scripts/news_judge.py

      - name: Auto-publish high-confidence fresh items (keeps the homepage current)
        env:
          AUTO_PUBLISH_MIN: ${{ vars.AUTO_PUBLISH_MIN || '8' }}
          AUTO_FRESH_HOURS: ${{ vars.AUTO_FRESH_HOURS || '12' }}
          AUTO_MAX_LIVE: ${{ vars.AUTO_MAX_LIVE || '11' }}
        run: python scripts/auto_publish.py

      - name: Commit if changed
        env:
          GIT_NAME: grok-wire-agent
          GIT_EMAIL: wire-agent@users.noreply.github.com
        run: |
          bash scripts/safe_commit.sh "Wire: file to desk queue $(date -u +'%Y-%m-%d %H:%M UTC')" live-data.json live-data-pending.json desk-decisions.json
