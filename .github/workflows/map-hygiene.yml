name: Map hygiene (drop past meetings & events)

on:
  schedule:
    - cron: "0 8 * * *"    # daily, 4 AM ET
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: map-hygiene
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Prune stale map points
        run: python scripts/prune_map.py
      - name: Commit if changed
        env:
          GIT_NAME: map-hygiene
          GIT_EMAIL: map-hygiene@users.noreply.github.com
        run: |
          bash scripts/safe_commit.sh "Map hygiene: drop past meetings & events $(date -u +'%Y-%m-%d')" map-data.json
