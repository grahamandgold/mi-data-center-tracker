<style>
  :root{--navy:#0C1E33;--ink:#14212E;--paper:#FFFFFF;--panel:#F5F8FC;--panel-2:#E7EEF6;--mist:#EDF1F6;--lake:#1E6FC4;--faint:#5F6875;--soft:#4C5661;--hair:rgba(12,30,51,0.13);--proj:#CF102D;--op:#16A36F;--mor:#E09820;--gray:#8A847C;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--paper);color:var(--ink);font-family:Archivo,sans-serif;display:flex;flex-direction:column;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--hair);flex-wrap:wrap;}
  .bar .t{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink);}
  .bar .t b{font-family:Archivo,sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:-0.01em;line-height:1;}
  .bar .t i{font-family:'IBM Plex Mono',monospace;font-style:normal;font-size:7.5px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase;display:block;margin-top:3px;}
  .stats{display:flex;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
  .stats b{color:var(--ink);font-family:Archivo;font-weight:800;font-size:13px;}
  .stage{position:relative;flex:1;min-height:220px;}
  #map{position:absolute;inset:0;background:var(--mist);}
  .leaflet-container{background:var(--mist);font-family:Archivo,sans-serif;}
  .leaflet-control-attribution{background:rgba(255,255,255,.82)!important;color:#8a8f98!important;font-size:9px!important;}
  .mapbadge{position:absolute;bottom:10px;left:10px;z-index:600;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.95);border:1px solid var(--navy);padding:5px 10px 5px 8px;text-decoration:none;color:var(--ink);box-shadow:0 6px 20px rgba(12,30,51,0.16);}
  .mapbadge b{display:block;font-family:Archivo;font-weight:800;font-size:9.5px;letter-spacing:-0.01em;text-transform:uppercase;line-height:1;}
  .mapbadge i{display:block;font-family:'IBM Plex Mono',monospace;font-style:normal;font-size:6.5px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;margin-top:2px;line-height:1;}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;border-top:1px solid var(--hair);flex-wrap:wrap;}
  .legend{display:flex;gap:12px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);flex-wrap:wrap;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}
  button{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:var(--lake);color:#fff;border:0;padding:8px 13px;cursor:pointer;}
  .embed-box{display:none;padding:10px 14px;border-top:1px solid var(--hair);background:var(--panel);}
  .embed-box code{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink);word-break:break-all;display:block;margin-bottom:8px;}
</style>
</head>

  if(/withdraw|reject|cancel|dead|denied/.test(st)) return "#8A847C";
  if(/construction/.test(st)) return "#CF102D";
  if(/approv|operating|operational|built/.test(st)) return "#16A36F";
  return "#E09820";
}
fetch("../map-data.json").then(function(r){return r.json();}).then(function(d){
  var pts=(d.map_points||[]);
  var proj=pts.filter(function(p){return p.layer==="projects" && p.latitude;});
  var pauses=pts.filter(function(p){return p.layer==="moratoria";}).length;
  var mw=0;
  proj.forEach(function(p){ var m=parseFloat(String(p.power_mw||"").replace(/,/g,"")); if(m) mw+=m; });
  document.getElementById("s-sites").textContent=proj.length;
  document.getElementById("s-mw").textContent=(mw/1000).toFixed(1);
  document.getElementById("s-pause").textContent=pauses;
  proj.forEach(function(p){
    var m=parseFloat(String(p.power_mw||"").replace(/,/g,""))||0;
    var r=m>0?Math.max(6,Math.min(24,5+Math.sqrt(m)*0.55)):6;
    L.circleMarker([p.latitude,p.longitude],{radius:r,color:"#fff",weight:1.6,fillColor:statusColor(p.status),fillOpacity:m>0?0.9:0.5,dashArray:m>0?null:"2 3"})
     .bindTooltip("<b>"+esc(p.name||p.municipality)+"</b><br>"+esc(p.county||"")+" County — "+esc(p.status||"")+(m?" · "+Math.round(m).toLocaleString()+" MW":""),{direction:"top"})
     .addTo(map);
  });
}).catch(function(e){ console.error(e); });

var code='<iframe src="'+EMBED_URL+'" width="100%" height="520" style="border:1px solid #d7dde5" loading="lazy" title="Michigan Data Center Tracker — Live Map"></iframe>';
document.getElementById("embedCode").textContent=code;
document.getElementById("embedBtn").addEventListener("click",function(){ var b=document.getElementById("embedBox"); b.style.display=b.style.display==="block"?"none":"block"; });
document.getElementById("copyBtn").addEventListener("click",function(ev){ navigator.clipboard.writeText(code); ev.target.textContent="Copied ✓"; setTimeout(function(){ev.target.textContent="Copy embed code";},1500); });
</script>
